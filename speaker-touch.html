<!--
  speaker-touch.html — adds a touch-friendly "Touch" layout to reveal.js's
  speaker-notes view (the popup opened with the "S" key).

  WHY: switching slides from the speaker window is awkward on a touch screen.
  The built-in layouts (Default / Wide / Tall / Notes only) show an upcoming-
  slide preview and have no large tap targets, so advancing means hunting for
  a small hotspot.

  WHAT this adds — a "Touch" layout (picked from the layout dropdown, and made
  the default when the popup opens) that, taking the "Wide" layout as a base:
    • hides the upcoming-slide preview,
    • shows the speaker NOTES on top (large, readable) and the CURRENT slide
      below it at the FULL width of the window, and
    • adds two big PREV / NEXT buttons across the bottom for the touch screen.
  A slim clock/timer row is kept above the notes — a defense is strictly timed,
  so losing it would hurt. (To drop it, see the `.speaker-controls-time` rule.)

  HOW: the notes plugin opens the speaker view with
       window.open('about:blank', 'reveal.js - Notes', …)
       then document.write()s the speaker-view template into it. That popup is
       same-origin, so from this (main) window we wrap window.open, grab the
       popup, inject a <style> for the new layout, add the dropdown option and
       the nav buttons, and wire the buttons to THIS window's Reveal API. The
       plugin then syncs the popup's current-slide + notes as usual.

  This file is injected via `include-after-body` in presentation_en.qmd, so it
  is inlined into the self-contained HTML and needs no extra assets.
-->
<script>
(function () {
  "use strict";

  var LAYOUT_ID = "touch";
  var LAYOUT_LABEL = "Touch";

  // CSS injected INTO the speaker-view popup. Keyed on the body attribute the
  // plugin already toggles, so other layouts keep working untouched.
  var CSS = [
    /* Hide the upcoming-slide preview in the touch layout. */
    'body[data-speaker-layout="' + LAYOUT_ID + '"] #upcoming-slide { display: none !important; }',

    /* Notes on top: full width, large and readable. */
    'body[data-speaker-layout="' + LAYOUT_ID + '"] #speaker-controls {',
    '  top: 0 !important; left: 0 !important;',
    '  width: 100% !important; height: 40% !important;',
    '  padding: 8px 16px !important; overflow: auto !important;',
    '  font-size: 1.3em !important;',
    '}',
    'body[data-speaker-layout="' + LAYOUT_ID + '"] .speaker-controls-notes .value {',
    '  font-size: 1.5em !important; line-height: 1.5 !important;',
    '}',
    /* Slim clock/timer row (kept — a defense is timed). Delete this block to hide it. */
    'body[data-speaker-layout="' + LAYOUT_ID + '"] .speaker-controls-time {',
    '  padding: 6px 16px !important; margin-bottom: 6px !important;',
    '}',
    'body[data-speaker-layout="' + LAYOUT_ID + '"] .speaker-controls-time .timer,',
    'body[data-speaker-layout="' + LAYOUT_ID + '"] .speaker-controls-time .clock,',
    'body[data-speaker-layout="' + LAYOUT_ID + '"] .speaker-controls-time .pacing .hours-value,',
    'body[data-speaker-layout="' + LAYOUT_ID + '"] .speaker-controls-time .pacing .minutes-value,',
    'body[data-speaker-layout="' + LAYOUT_ID + '"] .speaker-controls-time .pacing .seconds-value {',
    '  font-size: 1.2em !important;',
    '}',

    /* Current slide below the notes: full width, big. */
    'body[data-speaker-layout="' + LAYOUT_ID + '"] #current-slide {',
    '  top: 40% !important; left: 0 !important;',
    '  width: 100% !important; height: 48% !important; padding: 6px !important;',
    '}',

    /* Big touch nav bar across the bottom (only shown in the touch layout). */
    '#touch-nav { display: none; }',
    'body[data-speaker-layout="' + LAYOUT_ID + '"] #touch-nav {',
    '  display: flex; position: fixed; left: 0; bottom: 0;',
    '  width: 100%; height: 12%; gap: 10px; padding: 8px;',
    '  box-sizing: border-box; z-index: 100;',
    '}',
    '#touch-nav button {',
    '  flex: 1; border: 0; border-radius: 12px;',
    '  background: #0065BD; color: #fff; font-weight: bold; font-size: 6vh;',
    '  cursor: pointer; -webkit-tap-highlight-color: rgba(0,0,0,0);',
    '  touch-action: manipulation; box-shadow: 0 2px 6px rgba(0,0,0,0.3);',
    '}',
    '#touch-nav button:active { background: #00497f; }'
  ].join("\n");

  // Wrap window.open so we can customize the reveal speaker-view popup. Every
  // other window.open call is passed straight through untouched.
  var realOpen = window.open;
  window.open = function (url, name) {
    var win = realOpen.apply(window, arguments);
    if (win && name === "reveal.js - Notes") {
      customizeSpeakerView(win);
    }
    return win;
  };

  // The popup's DOM only exists after the plugin document.write()s the template
  // and its inline script runs, so poll until the layout dropdown shows up.
  function customizeSpeakerView(win) {
    var tries = 0;
    var iv = setInterval(function () {
      tries++;
      var doc, dropdown;
      try {
        doc = win.document;
        dropdown = doc && doc.querySelector(".speaker-layout-dropdown");
      } catch (e) {
        return; // not ready / transient cross-origin during about:blank load
      }
      if (doc.body && dropdown) {
        clearInterval(iv);
        inject(win, doc, dropdown);
      } else if (tries > 100) {
        clearInterval(iv); // give up after ~10 s
      }
    }, 100);
  }

  function inject(win, doc, dropdown) {
    try {
      // 1) Layout CSS.
      var style = doc.createElement("style");
      style.textContent = CSS;
      doc.head.appendChild(style);

      // 2) Add the "Touch" option to the layout dropdown.
      if (!dropdown.querySelector('option[value="' + LAYOUT_ID + '"]')) {
        var opt = doc.createElement("option");
        opt.value = LAYOUT_ID;
        opt.textContent = LAYOUT_LABEL;
        dropdown.appendChild(opt);
      }

      // 3) Big PREV / NEXT touch buttons → drive THIS window's deck.
      if (!doc.getElementById("touch-nav")) {
        var nav = doc.createElement("div");
        nav.id = "touch-nav";
        var prev = doc.createElement("button");
        prev.type = "button";
        prev.textContent = "‹  Prev";
        prev.setAttribute("aria-label", "Previous slide");
        var next = doc.createElement("button");
        next.type = "button";
        next.textContent = "Next  ›";
        next.setAttribute("aria-label", "Next slide");
        nav.appendChild(prev);
        nav.appendChild(next);
        doc.body.appendChild(nav);
        // Looked up at click time so it survives a deck reconnect.
        prev.addEventListener("click", function () {
          if (window.Reveal) { try { window.Reveal.prev(); } catch (e) {} }
        });
        next.addEventListener("click", function () {
          if (window.Reveal) { try { window.Reveal.next(); } catch (e) {} }
        });
      }

      // 4) Make "Touch" the active layout on open. Dispatching 'change' reuses
      //    the plugin's own setLayout() (sets the body attribute + persists it).
      var labelEl = doc.querySelector(".speaker-layout-label");
      function refreshLabel() {
        if (labelEl && dropdown.value === LAYOUT_ID) {
          labelEl.innerHTML = "Layout: " + LAYOUT_LABEL;
        }
      }
      dropdown.addEventListener("change", refreshLabel);
      dropdown.value = LAYOUT_ID;
      try {
        dropdown.dispatchEvent(new win.Event("change"));
      } catch (e) {
        // Fallback if the popup's Event constructor isn't reachable.
        doc.body.setAttribute("data-speaker-layout", LAYOUT_ID);
      }
      refreshLabel();
    } catch (e) {
      if (window.console) console.warn("speaker-touch: injection failed", e);
    }
  }
})();
</script>
